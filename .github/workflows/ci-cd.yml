name: Build & Push FinAgents System

on:
  push:
    branches:
      - master

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ---------------------------
      # Docker Setup
      # ---------------------------
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ---------------------------
      # Build Backend Agent Image
      # ---------------------------
      - name: Build FineAgent image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/fineagent:latest .

      - name: Push FineAgent
        run: docker push ${{ secrets.DOCKER_USERNAME }}/fineagent:latest