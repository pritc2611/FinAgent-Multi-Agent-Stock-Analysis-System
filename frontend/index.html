<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FinAgent — Research Terminal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;0,600;1,300&family=Bebas+Neue&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<!-- ── canvas for particle bg ── -->
<canvas id="bgCanvas"></canvas>

<div class="shell">

  <!-- ══ TOP BAR ══════════════════════════════════════════════ -->
  <header class="topbar">
    <div class="topbar-left">
      <div class="logo">
        <span class="logo-bracket">[</span>
        <span class="logo-text">FA</span>
        <span class="logo-bracket">]</span>
      </div>
      <div class="topbar-title">
        <span class="title-main">FinAgent</span>
        <span class="title-sub">RESEARCH TERMINAL v2.0</span>
      </div>
    </div>
    <div class="topbar-right">
      <div class="status-group">
        <span class="status-led" id="healthLed"></span>
        <span class="status-txt" id="healthTxt">CONNECTING</span>
      </div>
      <div class="status-group">
        <span class="status-led neutral" id="streamLed"></span>
        <span class="status-txt" id="streamTxt">IDLE</span>
      </div>
      <div class="clock" id="clock">00:00:00</div>
    </div>
  </header>

  <!-- ══ MAIN GRID ══════════════════════════════════════════════ -->
  <div class="main-grid">

    <!-- ── LEFT COLUMN ─────────────────────────────────────── -->
    <div class="col-left">

      <!-- Query input card -->
      <div class="card query-card">
        <div class="card-label">NEW ANALYSIS</div>
        <div class="query-wrap">
          <div class="query-cursor" id="queryCursor"></div>
          <textarea id="query" rows="3" placeholder="Ask about any stock — e.g. Analyze Apple risk for next quarter…" spellcheck="false"></textarea>
        </div>
        <div class="query-footer">
          <div class="conn-mini">
            <span class="conn-label">API</span>
            <input id="apiBase" type="url" placeholder="same-origin (HF Space default)"/>
          </div>
          <div class="btn-row">
            <button id="stopBtn" class="btn-stop" disabled>
              <span class="btn-icon">■</span> ABORT
            </button>
            <button id="submitBtn" class="btn-run">
              <span class="btn-icon" id="submitIcon">▶</span>
              <span id="submitLabel">RUN ANALYSIS</span>
            </button>
          </div>
        </div>
      </div>

      <!-- Pipeline viz card -->
      <div class="card pipeline-card">
        <div class="card-label">AGENT PIPELINE</div>
        <div class="pipeline-track" id="pipelineTrack">
          <!-- nodes injected by JS -->
        </div>
        <div class="pipeline-log" id="pipelineLog">
          <div class="log-empty">Awaiting pipeline activation…</div>
        </div>
      </div>

      <!-- Stats bar -->
      <div class="stats-bar">
        <div class="stat">
          <span class="stat-val" id="nodeCount">0</span>
          <span class="stat-key">NODES</span>
        </div>
        <div class="stat-sep">|</div>
        <div class="stat">
          <span class="stat-val" id="completedCount">0</span>
          <span class="stat-key">RUNS</span>
        </div>
        <div class="stat-sep">|</div>
        <div class="stat">
          <span class="stat-val" id="runIdShort">—</span>
          <span class="stat-key">RUN ID</span>
        </div>
        <div class="stat-sep">|</div>
        <div class="stat">
          <span class="stat-val" id="durationVal">—</span>
          <span class="stat-key">DURATION</span>
        </div>
      </div>
    </div>

    <!-- ── RIGHT COLUMN ────────────────────────────────────── -->
    <div class="col-right">

      <!-- Ticker hero -->
      <div class="ticker-hero" id="tickerHero" style="display:none">
        <div class="ticker-sym-wrap">
          <span class="ticker-sym" id="tickerSym">—</span>
          <span class="ticker-flag" id="riskFlag"></span>
        </div>
        <span class="ticker-company" id="tickerCompany">—</span>
        <p class="ticker-chat" id="tickerChat"></p>
      </div>

      <!-- Result tabs -->
      <div class="card result-card" id="resultCard">
        <div class="result-empty" id="resultEmpty">
          <div class="empty-glyph">◈</div>
          <p>Run an analysis to generate an investment brief.</p>
        </div>
        <div id="resultFull" style="display:none">
          <!-- Metrics strip -->
          <div class="metrics-row" id="metricsRow"></div>
          <!-- Tabs -->
          <div class="rtabs">
            <button class="rtab active" data-tab="memo">BRIEF</button>
            <button class="rtab" data-tab="risk">RISK</button>
            <button class="rtab" data-tab="hedge">HEDGE</button>
            <button class="rtab" data-tab="news">NEWS</button>
          </div>
          <div class="rtab-panels">
            <div class="rtab-panel active" id="tab-memo"></div>
            <div class="rtab-panel" id="tab-risk"></div>
            <div class="rtab-panel" id="tab-hedge"></div>
            <div class="rtab-panel" id="tab-news"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ══ HISTORY FEED ══════════════════════════════════════════ -->
  <div class="history-section">
    <div class="history-header">
      <span class="card-label">RECENT ANALYSES</span>
      <button class="btn-ghost-sm" id="refreshHistBtn">↺ REFRESH</button>
    </div>
    <div class="history-feed" id="historyFeed">
      <div class="log-empty">No analyses yet this session.</div>
    </div>
  </div>

</div><!-- .shell -->

<!-- History detail modal -->
<div class="modal-overlay" id="modalOverlay" style="display:none">
  <div class="modal-box" id="modalBox">
    <div class="modal-header">
      <div>
        <span class="modal-ticker" id="modalTicker">—</span>
        <span class="modal-company" id="modalCompany">—</span>
      </div>
      <button class="modal-close" id="modalClose">✕</button>
    </div>
    <div class="modal-metrics" id="modalMetrics"></div>
    <div class="modal-tabs">
      <button class="mtab active" data-mtab="mmemo">BRIEF</button>
      <button class="mtab" data-mtab="mrisk">RISK</button>
      <button class="mtab" data-mtab="mhedge">HEDGE</button>
      <button class="mtab" data-mtab="mnews">NEWS</button>
    </div>
    <div class="modal-body">
      <div class="mtab-panel active" id="mmemo"></div>
      <div class="mtab-panel" id="mrisk"></div>
      <div class="mtab-panel" id="mhedge"></div>
      <div class="mtab-panel" id="mnews"></div>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
